name: Build Android APK

on:
  workflow_run:
    workflows: ["Lint"]
    types: [completed]
    branches: [master]

  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download large assets from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets/videos assets/models
          gh release download large-assets \
            --repo NOTMORSE-PROG/Alex_Quest \
            --pattern "*.mp4" \
            --dir assets/videos
          gh release download large-assets \
            --repo NOTMORSE-PROG/Alex_Quest \
            --pattern "*.bin" \
            --dir assets/models

      - name: Verify asset files
        run: |
          echo "Checking LFS video files..."
          shopt -s nullglob
          files=(assets/videos/*.mp4)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No video files found — skipping LFS verification."
          else
            for f in "${files[@]}"; do
              FILE_SIZE=$(stat --printf="%s" "$f")
              if [ "$FILE_SIZE" -lt 1000000 ]; then
                echo "::error::LFS file $f is a pointer ($FILE_SIZE bytes), not the actual video."
                exit 1
              fi
              echo "  $(basename "$f"): $((FILE_SIZE / 1048576))MB"
            done
            echo "All LFS video files verified."
          fi

          echo "Checking LFS model files..."
          WHISPER_SIZE=$(stat --printf="%s" "assets/models/ggml-base.en-q5_1.bin" 2>/dev/null || echo 0)
          if [ "$WHISPER_SIZE" -lt 40000000 ]; then
            echo "::error::Whisper model is an LFS pointer or missing ($WHISPER_SIZE bytes)."
            exit 1
          fi
          echo "  ggml-base.en-q5_1.bin: $((WHISPER_SIZE / 1048576))MB"

          VAD_SIZE=$(stat --printf="%s" "assets/models/ggml-silero-v6.2.0.bin" 2>/dev/null || echo 0)
          if [ "$VAD_SIZE" -lt 500000 ]; then
            echo "::error::VAD model is an LFS pointer or missing ($VAD_SIZE bytes)."
            exit 1
          fi
          echo "  ggml-silero-v6.2.0.bin: $((VAD_SIZE / 1024))KB"
          echo "All LFS model files verified."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate native project
        run: npx expo prebuild --clean --platform android

      - name: Copy models into Android assets
        run: |
          mkdir -p android/app/src/main/assets/models
          cp assets/models/ggml-base.en-q5_1.bin android/app/src/main/assets/models/
          cp assets/models/ggml-silero-v6.2.0.bin android/app/src/main/assets/models/
          echo "Copied models:"
          ls -lh android/app/src/main/assets/models/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Boost Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=./release.keystore
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Determine Gradle command
        id: gradle
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            echo "command=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "command=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew ${{ steps.gradle.outputs.command }} --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Debug — APK asset contents
        if: always()
        run: |
          APK_PATH="${{ steps.gradle.outputs.apk_path }}"
          echo "All .bin entries in APK:"
          unzip -l "$APK_PATH" | grep -i "\.bin" || echo "(none)"
          echo "assets/ entries (first 30):"
          unzip -l "$APK_PATH" | grep "assets/" | head -30 || echo "(none)"

      - name: Verify models are bundled inside the APK
        run: |
          APK_PATH="${{ steps.gradle.outputs.apk_path }}"
          echo "Inspecting $APK_PATH for bundled models..."

          WHISPER_ENTRY=$(unzip -l "$APK_PATH" | grep -E "models/ggml-base" | awk '{print $4}' | head -n1)
          if [ -z "$WHISPER_ENTRY" ]; then
            echo "::error::Whisper model is NOT inside the APK."
            echo "All .bin files found in APK:"
            unzip -l "$APK_PATH" | grep -i "\.bin" || echo "(none)"
            exit 1
          fi
          WHISPER_BYTES=$(unzip -p "$APK_PATH" "$WHISPER_ENTRY" | wc -c)
          echo "  whisper: $WHISPER_ENTRY ($((WHISPER_BYTES / 1048576))MB)"
          if [ "$WHISPER_BYTES" -lt 40000000 ]; then
            echo "::error::Whisper entry inside APK is too small ($WHISPER_BYTES bytes)."
            exit 1
          fi

          VAD_ENTRY=$(unzip -l "$APK_PATH" | grep -E "models/ggml-silero" | awk '{print $4}' | head -n1)
          if [ -z "$VAD_ENTRY" ]; then
            echo "::error::Silero VAD model is NOT inside the APK."
            exit 1
          fi
          VAD_BYTES=$(unzip -p "$APK_PATH" "$VAD_ENTRY" | wc -c)
          echo "  vad: $VAD_ENTRY ($((VAD_BYTES / 1024))KB)"
          if [ "$VAD_BYTES" -lt 500000 ]; then
            echo "::error::VAD entry inside APK is too small ($VAD_BYTES bytes)."
            exit 1
          fi

          # Sanity-check that whisper.rn native libs landed in the APK for arm64-v8a
          if ! unzip -l "$APK_PATH" | grep -q "lib/arm64-v8a/.*whisper"; then
            echo "::warning::No libwhisper*.so found under lib/arm64-v8a/ — verify whisper.rn native bundling."
            unzip -l "$APK_PATH" | grep "lib/arm64-v8a/" | head -20 || true
          fi

      - name: Extract git metadata
        id: meta
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          COMMIT_MSG=$(git log -1 --format="%s")
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          APK_NAME="AlexsQuest-${BUILD_TYPE}-${BRANCH_SLUG}-${SHORT_SHA}-${TIMESTAMP}.apk"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH="${{ steps.gradle.outputs.apk_path }}"
          cp "$APK_PATH" ${{ steps.meta.outputs.apk_name }}

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APK_NAME="${{ steps.meta.outputs.apk_name }}"
          NOTES=$(cat <<EOF
          **Branch:** \`${{ steps.meta.outputs.branch }}\`
          **Commit:** \`${{ steps.meta.outputs.short_sha }}\`
          **Message:** ${{ steps.meta.outputs.commit_msg }}
          **Build type:** \`${{ steps.meta.outputs.build_type }}\`
          **Built:** ${{ steps.meta.outputs.timestamp }}
          EOF
          )

          if gh release view latest >/dev/null 2>&1; then
            echo "Release 'latest' exists — clearing old assets and updating notes."
            gh release view latest --json assets --jq '.assets[].name' | while read -r asset; do
              [ -n "$asset" ] && gh release delete-asset latest "$asset" --yes || true
            done
            gh release edit latest \
              --title "Alex's Quest — Latest Build" \
              --notes "$NOTES" \
              --prerelease=false
          else
            echo "Release 'latest' does not exist — creating it."
            gh release create latest \
              --title "Alex's Quest — Latest Build" \
              --notes "$NOTES" \
              --target "${{ github.event.workflow_run.head_sha || github.sha }}"
          fi

          echo "Uploading $APK_NAME..."
          gh release upload latest "$APK_NAME" --clobber

      - name: Build summary
        if: always()
        run: |
          echo "## Alex's Quest APK Build" >> $GITHUB_STEP_SUMMARY
          echo "- **APK:** \`${{ steps.meta.outputs.apk_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ steps.meta.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build type:** \`${{ steps.meta.outputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
